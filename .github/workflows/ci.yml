name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
          enable-cache: true # Beschleunigt die CI bei jedem weiteren Run enorm

      - name: Install dependencies
        # --frozen stellt sicher, dass exakt die Lockfile-Versionen genutzt werden
        run: uv sync --frozen

      - name: Lint & Syntax Check
        # Prüft das gesamte Projekt (inkl. Submodule) in Millisekunden auf Fehler
        run: uv run ruff check .

      - name: Type Check (Optional aber empfohlen)
        # Wichtig für MCP, um sicherzustellen, dass Tools die richtigen Schemas liefern
        run: uv run pyright .

      - name: Run Tests
        # Führt deine Tests aus (pytest ist meist in pyproject.toml definiert)
        run: uv run pytest

      - name: Verify MCP server imports
        # Prüft, ob das 'mcp' Objekt korrekt initialisiert werden kann
        run: |
          uv run python -c "from main import mcp; print('✅ MCP Server object initialized')"